<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QC Flash Cards - Fixed Version</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Battambang:wght@400;700&family=Orbitron:wght@700;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* ═══════════════════════════════════════════════════════════════
           QC FLASH CARDS - PROFESSIONAL EDITION v2.1
           Fixed: Flip functionality on all cards
        ═══════════════════════════════════════════════════════════════ */

        /* ─── Design Tokens ─────────────────────────────────────────────── */
        :root {
            --bg:       #070b1a;
            --surface:  #0f1630;
            --card:     #141d38;
            --border:   #1e2d52;
            --primary:  #4f8ef7;
            --accent:   #f4c430;
            --success:  #22d472;
            --danger:   #ff4d6d;
            --text:     #e8eaf6;
            --muted:    #7b89b8;
            --radius:   20px;
            --shadow:   0 24px 60px rgba(0,0,0,0.5);
            --transition: cubic-bezier(0.4, 0.0, 0.2, 1);
        }

        /* ─── Reset & Base ──────────────────────────────────────────────── */
        *, *::before, *::after {
            margin: 0; 
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        html, body {
            height: 100%;
            font-family: 'DM Sans', 'Battambang', sans-serif;
            overflow-x: hidden;
        }
        
        body {
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 20px 15px 40px;
            position: relative;
        }

        /* ─── Animated Background ───────────────────────────────────────── */
        body::before {
            content: '';
            position: fixed; 
            inset: 0;
            background:
                radial-gradient(ellipse 60% 40% at 20% 10%, rgba(79,142,247,0.12) 0%, transparent 60%),
                radial-gradient(ellipse 50% 40% at 80% 80%, rgba(244,196,48,0.07) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        /* ─── Container ─────────────────────────────────────────────────── */
        .wrap {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 460px;
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        /* ─── Header Brand ──────────────────────────────────────────────── */
        .brand-header {
            text-align: center;
            padding: 28px 20px 20px;
        }
        
        .brand-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(79,142,247,0.12);
            border: 1px solid rgba(79,142,247,0.3);
            border-radius: 100px;
            padding: 6px 16px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--primary);
            text-transform: uppercase;
            margin-bottom: 14px;
        }
        
        .brand-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 26px;
            font-weight: 900;
            color: var(--text);
            letter-spacing: 1px;
            line-height: 1.2;
        }
        
        .brand-title span {
            color: var(--accent);
        }
        
        .brand-sub {
            font-family: 'Battambang', sans-serif;
            font-size: 14px;
            color: var(--muted);
            margin-top: 6px;
        }

        /* ─── Card ──────────────────────────────────────────────────────── */
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 28px 24px;
            box-shadow: var(--shadow);
        }

        /* ─── Progress ──────────────────────────────────────────────────── */
        .progress-wrap {
            margin-bottom: 20px;
        }
        
        .progress-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        
        .progress-label {
            font-family: 'Battambang', sans-serif;
            font-size: 12px;
            color: var(--muted);
        }
        
        .progress-count {
            font-family: 'Orbitron', sans-serif;
            font-size: 12px;
            color: var(--primary);
            font-weight: 700;
        }
        
        .progress-track {
            width: 100%;
            height: 6px;
            background: var(--surface);
            border-radius: 100px;
            overflow: hidden;
            position: relative;
        }
        
        .progress-fill {
            height: 100%;
            width: 0%;
            border-radius: 100px;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            transition: width 0.5s var(--transition);
        }

        /* ─── Audio Controls ────────────────────────────────────────────── */
        .audio-controls {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            justify-content: center;
        }

        .speak-btn {
            width: 64px;
            height: 64px;
            background: rgba(79,142,247,0.1);
            border: 2px solid rgba(79,142,247,0.35);
            border-radius: 16px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all 0.2s var(--transition);
            position: relative;
            overflow: hidden;
        }

        .speak-btn:active {
            background: rgba(79,142,247,0.25);
            transform: scale(0.93);
        }

        .speak-btn.speaking {
            background: rgba(79,142,247,0.2);
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79,142,247,0.18);
        }

        .sp-icon {
            font-size: 28px;
            transition: transform 0.2s;
        }

        .wave-bars {
            display: flex;
            align-items: center;
            gap: 2px;
            height: 12px;
        }

        .wave-bars span {
            display: block;
            width: 3px;
            border-radius: 3px;
            background: var(--primary);
            height: 4px;
            transition: height 0.1s;
        }

        .speak-btn.speaking .wave-bars span:nth-child(1) { animation: bar 0.7s 0.0s ease-in-out infinite; }
        .speak-btn.speaking .wave-bars span:nth-child(2) { animation: bar 0.7s 0.1s ease-in-out infinite; }
        .speak-btn.speaking .wave-bars span:nth-child(3) { animation: bar 0.7s 0.2s ease-in-out infinite; }
        .speak-btn.speaking .wave-bars span:nth-child(4) { animation: bar 0.7s 0.3s ease-in-out infinite; }
        .speak-btn.speaking .wave-bars span:nth-child(5) { animation: bar 0.7s 0.15s ease-in-out infinite; }

        @keyframes bar {
            0%, 100% { height: 3px; }
            50% { height: 12px; }
        }

        /* ─── Speed Control ─────────────────────────────────────────────── */
        .speed-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 20px;
        }

        .speed-lbl {
            font-family: 'Battambang', sans-serif;
            font-size: 11px;
            color: var(--muted);
        }

        .speed-toggle {
            display: flex;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 100px;
            overflow: hidden;
        }

        .speed-toggle button {
            padding: 4px 10px;
            border: none;
            background: transparent;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            font-size: 10px;
            font-weight: 700;
            color: var(--muted);
            transition: all 0.2s var(--transition);
        }

        .speed-toggle button.active {
            background: var(--primary);
            color: #fff;
        }

        /* ─── Flash Card Container ──────────────────────────────────────── 
            CRITICAL: ជៀសវាង animation conflicts
        ───────────────────────────────────────────────────────────────── */
        .flashcard-container {
            perspective: 1000px;
            margin-bottom: 24px;
            min-height: 420px;
            position: relative;
        }

        .flashcard {
            position: relative;
            width: 100%;
            height: 420px;
            transform-style: preserve-3d;
            transition: transform 0.6s var(--transition);
            /* IMPORTANT: កុំប្រើ animation ផ្សេងទៀតនៅទីនេះ */
        }

        /* CRITICAL FIX: Flip state */
        .flashcard.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden; /* Safari */
            background: var(--surface);
            border: 2px solid var(--border);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .card-front {
            z-index: 2;
            transform: rotateY(0deg);
        }

        .card-back {
            transform: rotateY(180deg);
            background: linear-gradient(135deg, var(--surface) 0%, #0a0e1c 100%);
        }

        /* ─── Card Content ──────────────────────────────────────────────── */
        .card-label {
            position: absolute;
            top: 16px;
            left: 16px;
            background: rgba(79,142,247,0.15);
            border: 1px solid rgba(79,142,247,0.3);
            border-radius: 100px;
            padding: 4px 12px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1.5px;
            color: var(--primary);
            text-transform: uppercase;
            z-index: 10;
        }

        .card-back .card-label {
            background: rgba(244,196,48,0.15);
            border-color: rgba(244,196,48,0.3);
            color: var(--accent);
        }

        .chinese-display {
            font-size: 72px;
            font-weight: 900;
            color: var(--text);
            margin-bottom: 20px;
            line-height: 1;
            text-shadow: 0 4px 12px rgba(79,142,247,0.3);
            user-select: none;
        }

        .khmer-display {
            font-family: 'Battambang', sans-serif;
            font-size: 28px;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 20px;
            text-align: center;
            line-height: 1.4;
            user-select: none;
        }

        .image-display {
            width: 100%;
            max-height: 200px;
            object-fit: contain;
            border-radius: 12px;
            margin-top: 16px;
            border: 1px solid var(--border);
        }

        /* ─── Flip Button ───────────────────────────────────────────────── */
        .flip-btn {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 28px;
            background: linear-gradient(135deg, var(--primary) 0%, #6fa8ff 100%);
            border: none;
            border-radius: 100px;
            font-family: 'Battambang', sans-serif;
            font-size: 14px;
            font-weight: 700;
            color: #fff;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(79,142,247,0.4);
            transition: all 0.2s var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 10;
        }

        .flip-btn:hover {
            box-shadow: 0 8px 24px rgba(79,142,247,0.5);
            transform: translateX(-50%) translateY(-2px);
        }

        .flip-btn:active {
            transform: translateX(-50%) scale(0.95);
        }

        .flip-icon {
            font-size: 18px;
        }

        /* ─── Navigation Buttons ────────────────────────────────────────── */
        .nav-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }

        .btn {
            padding: 14px;
            border: 2px solid var(--border);
            border-radius: 14px;
            cursor: pointer;
            font-family: 'Battambang', sans-serif;
            font-size: 15px;
            font-weight: 700;
            transition: all 0.2s var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-prev {
            background: var(--surface);
            color: var(--text);
        }

        .btn-prev:hover:not(:disabled) {
            border-color: var(--primary);
            background: rgba(79,142,247,0.08);
        }

        .btn-next {
            background: linear-gradient(135deg, var(--primary) 0%, #6fa8ff 100%);
            color: #fff;
            border-color: var(--primary);
            box-shadow: 0 6px 20px rgba(79,142,247,0.3);
        }

        .btn-next:hover:not(:disabled) {
            box-shadow: 0 8px 24px rgba(79,142,247,0.4);
        }

        .btn:active:not(:disabled) {
            transform: scale(0.96);
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* ─── Action Buttons ────────────────────────────────────────────── */
        .action-buttons {
            display: flex;
            gap: 10px;
        }

        .btn-action {
            flex: 1;
            padding: 12px;
            border: 1.5px solid var(--border);
            border-radius: 12px;
            background: var(--surface);
            color: var(--text);
            font-family: 'Battambang', sans-serif;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .btn-action:hover {
            border-color: var(--primary);
            background: rgba(79,142,247,0.08);
        }

        .btn-action:active {
            transform: scale(0.96);
        }

        /* ─── Keyboard Hint ─────────────────────────────────────────────── */
        .keyboard-hint {
            text-align: center;
            padding: 16px 0 0;
            font-size: 11px;
            color: var(--muted);
            opacity: 0.6;
            font-family: 'Battambang', sans-serif;
        }

        .keyboard-hint kbd {
            display: inline-block;
            padding: 3px 8px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            font-family: 'Orbitron', monospace;
            font-size: 10px;
            font-weight: 700;
            color: var(--primary);
            margin: 0 2px;
        }

        /* ─── Footer ────────────────────────────────────────────────────── */
        .footer {
            text-align: center;
            padding: 18px 0 0;
            font-size: 11px;
            color: rgba(123,137,184,0.5);
            letter-spacing: 0.5px;
        }

        /* ─── Toast Notification ────────────────────────────────────────── */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px 24px;
            font-family: 'Battambang', sans-serif;
            font-size: 14px;
            color: var(--text);
            box-shadow: 0 12px 40px rgba(0,0,0,0.5);
            z-index: 1000;
            opacity: 0;
            transition: all 0.3s var(--transition);
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .toast.success {
            border-color: var(--success);
            background: rgba(34,212,114,0.1);
            color: var(--success);
        }

        /* ─── Animations ────────────────────────────────────────────────── */
        .fade-in {
            animation: fadeIn 0.4s var(--transition) both;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ─── Responsive ────────────────────────────────────────────────── */
        @media (max-width: 480px) {
            .chinese-display { font-size: 60px; }
            .khmer-display { font-size: 24px; }
            .flashcard-container { min-height: 380px; }
            .flashcard { height: 380px; }
        }
    </style>
</head>

        <!-- Navigation Buttons -->
        <div class="nav-buttons">

        </div>

        <!-- Action Buttons -->
        <div class="action-buttons">

            <button class="btn-action" id="resetBtn">↻ ចាប់ផ្តើមឡើងវិញ</button>

        <!-- Keyboard Hint -->
        <div class="keyboard-hint">

        </div>

    </div>

    <!-- Footer -->
    <div class="footer">© 2024 QC Flash Cards v2.1 - Fixed Edition</div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

/* ═══════════════════════════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════════════════════════ */
let cards = [...DATABASE];
let currentIndex = 0;
let isFlipped = false;
let currentAudio = null;
let ttsSpeed = 1.0;
let isPlaying = false;

/* ═══════════════════════════════════════════════════════════════════════
   DOM ELEMENTS
═══════════════════════════════════════════════════════════════════════ */
let flashcardEl;
let chineseTextEl;
let khmerTextEl;
let cardImageEl;
let progressFillEl;
let progressCountEl;
let prevBtnEl;
let nextBtnEl;
let speakBtnEl;
let toastEl;

/* ═══════════════════════════════════════════════════════════════════════
   INITIALIZATION
═══════════════════════════════════════════════════════════════════════ */
function init() {
    console.log('🔧 Initializing...');
    
    // Get DOM elements
    flashcardEl = document.getElementById('flashcard');
    chineseTextEl = document.getElementById('chineseText');
    khmerTextEl = document.getElementById('khmerText');
    cardImageEl = document.getElementById('cardImage');
    progressFillEl = document.getElementById('progressFill');
    progressCountEl = document.getElementById('progressCount');
    prevBtnEl = document.getElementById('prevBtn');
    nextBtnEl = document.getElementById('nextBtn');
    speakBtnEl = document.getElementById('speakBtn');
    toastEl = document.getElementById('toast');

    // Check if elements exist
    if (!flashcardEl) {
        console.error('❌ Flashcard element not found!');
        return;
    }

    console.log('✅ DOM elements loaded');

    // Setup event listeners
    setupEventListeners();

    // Initial render
    updateCard();
    updateProgress();
    updateNavButtons();

    // Unlock audio
    unlockAudio();

    console.log('✅ App initialized successfully');
}

/* ═══════════════════════════════════════════════════════════════════════
   EVENT LISTENERS - CRITICAL FIX!
═══════════════════════════════════════════════════════════════════════ */
function setupEventListeners() {
    // FLIP BUTTONS - Use event delegation
    const flipBtnFront = document.getElementById('flipBtnFront');
    const flipBtnBack = document.getElementById('flipBtnBack');
    
    if (flipBtnFront) {
        flipBtnFront.addEventListener('click', (e) => {
            e.stopPropagation();
            flipCard();
        });
    }
    
    if (flipBtnBack) {
        flipBtnBack.addEventListener('click', (e) => {
            e.stopPropagation();
            flipCard();
        });
    }

    // Navigation buttons
    if (prevBtnEl) {
        prevBtnEl.addEventListener('click', prevCard);
    }
    
    if (nextBtnEl) {
        nextBtnEl.addEventListener('click', nextCard);
    }

    // Speak button
    if (speakBtnEl) {
        speakBtnEl.addEventListener('click', playVoice);
    }

    // Speed toggle
    const speedToggle = document.getElementById('speedToggle');
    if (speedToggle) {
        speedToggle.addEventListener('click', (e) => {
            if (e.target.tagName === 'BUTTON') {
                const speed = parseFloat(e.target.dataset.speed);
                setSpeed(speed, e.target);
            }
        });
    }

    // Action buttons
    const shuffleBtn = document.getElementById('shuffleBtn');
    const resetBtn = document.getElementById('resetBtn');
    
    if (shuffleBtn) shuffleBtn.addEventListener('click', shuffleCards);
    if (resetBtn) resetBtn.addEventListener('click', resetProgress);

    // Keyboard
    document.addEventListener('keydown', handleKeyboard);

    console.log('✅ Event listeners attached');
}

function handleKeyboard(e) {
    switch(e.key) {
        case 'ArrowRight':
            e.preventDefault();
            nextCard();
            break;
        case 'ArrowLeft':
            e.preventDefault();
            prevCard();
            break;
        case ' ':
        case 'Enter':
            e.preventDefault();
            flipCard();
            break;
    }
}

/* ═══════════════════════════════════════════════════════════════════════
   FLIP CARD - CRITICAL FIX!
═══════════════════════════════════════════════════════════════════════ */
function flipCard() {
    if (!flashcardEl) {
        console.error('❌ Flashcard element not found!');
        return;
    }

    // Toggle flip state
    isFlipped = !isFlipped;
    
    if (isFlipped) {
        flashcardEl.classList.add('flipped');
        console.log('🔄 Flipped to BACK');
    } else {
        flashcardEl.classList.remove('flipped');
        console.log('🔄 Flipped to FRONT');
    }
}

/* ═══════════════════════════════════════════════════════════════════════
   UPDATE CARD - CRITICAL FIX!
═══════════════════════════════════════════════════════════════════════ */
function updateCard() {
    const card = cards[currentIndex];
    
    if (!card) {
        console.error('❌ Card not found!');
        return;
    }

    console.log(`📇 Card ${currentIndex + 1}:`, card.cn);

    // Update content
    if (chineseTextEl) chineseTextEl.textContent = card.cn;
    if (khmerTextEl) khmerTextEl.textContent = card.km;

    // Update image
    if (cardImageEl) {
        if (card.img) {
            cardImageEl.src = card.img;
            cardImageEl.style.display = 'block';
            cardImageEl.onerror = () => {
                cardImageEl.style.display = 'none';
            };
        } else {
            cardImageEl.style.display = 'none';
        }
    }

    // CRITICAL FIX: Reset flip state
    if (flashcardEl) {
        flashcardEl.classList.remove('flipped');
        isFlipped = false;
        console.log('✅ Flip state reset');
    }

    // Auto-play audio
    setTimeout(() => {
        playVoice();
    }, 400);
}

/* ═══════════════════════════════════════════════════════════════════════
   NAVIGATION
═══════════════════════════════════════════════════════════════════════ */
function nextCard() {
    if (currentIndex >= cards.length - 1) {
        showToast('នេះគឺជាកាតចុងក្រោយហើយ! 🎉', 'success');
        return;
    }

    stopAudio();
    currentIndex++;
    updateCard();
    updateProgress();
    updateNavButtons();
}

function prevCard() {
    if (currentIndex <= 0) {
        showToast('នេះគឺជាកាតដំបូងហើយ! 📚', 'success');
        return;
    }

    stopAudio();
    currentIndex--;
    updateCard();
    updateProgress();
    updateNavButtons();
}

function updateNavButtons() {
    if (prevBtnEl) prevBtnEl.disabled = (currentIndex === 0);
    if (nextBtnEl) nextBtnEl.disabled = (currentIndex === cards.length - 1);
}

/* ═══════════════════════════════════════════════════════════════════════
   PROGRESS
═══════════════════════════════════════════════════════════════════════ */
function updateProgress() {
    const progress = ((currentIndex + 1) / cards.length) * 100;
    
    if (progressFillEl) {
        progressFillEl.style.width = `${progress}%`;
    }
    
    if (progressCountEl) {
        progressCountEl.textContent = `${currentIndex + 1} / ${cards.length}`;
    }
}

/* ═══════════════════════════════════════════════════════════════════════
   ACTIONS
═══════════════════════════════════════════════════════════════════════ */
function shuffleCards() {
    stopAudio();
    
    cards = [...DATABASE];
    for (let i = cards.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [cards[i], cards[j]] = [cards[j], cards[i]];
    }
    
    currentIndex = 0;
    updateCard();
    updateProgress();
    updateNavButtons();
    
    showToast('បានច្របល់កាតហើយ! 🔀', 'success');
}

function resetProgress() {
    stopAudio();
    
    cards = [...DATABASE];
    currentIndex = 0;
    
    updateCard();
    updateProgress();
    updateNavButtons();
    
    showToast('បានចាប់ផ្តើមឡើងវិញ! ↻', 'success');
}

/* ═══════════════════════════════════════════════════════════════════════
   AUDIO
═══════════════════════════════════════════════════════════════════════ */
function setSpeed(value, btnElement) {
    ttsSpeed = value;
    
    document.querySelectorAll('.speed-toggle button').forEach(btn => {
        btn.classList.remove('active');
    });
    
    if (btnElement) {
        btnElement.classList.add('active');
    }
}

function playVoice() {
    if (isPlaying) {
        stopAudio();
        return;
    }

    const card = cards[currentIndex];
    if (!card || !card.cn) return;

    stopAudio();
    setSpeaking(true);
    isPlaying = true;

    const text = card.cn;
    const speed = Math.max(0.35, Math.min(ttsSpeed, 1.0));

    tryGoogleTTS(text, speed);
}

function tryGoogleTTS(text, speed) {
    const gttsSpeed = (speed * 0.9).toFixed(2);
    const url = `https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(text)}&tl=zh-CN&client=gtx&ttsspeed=${gttsSpeed}`;

    const audio = new Audio(url);
    currentAudio = audio;

    audio.onended = () => {
        setSpeaking(false);
        isPlaying = false;
        currentAudio = null;
    };

    audio.onerror = () => {
        setSpeaking(false);
        isPlaying = false;
        currentAudio = null;
        useSpeechSynthesis(text, speed);
    };

    audio.play().catch(() => {
        setSpeaking(false);
        isPlaying = false;
        currentAudio = null;
        useSpeechSynthesis(text, speed);
    });
}

function useSpeechSynthesis(text, speed) {
    if (!window.speechSynthesis) return;

    window.speechSynthesis.cancel();
    setSpeaking(true);
    isPlaying = true;

    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'zh-CN';
    utterance.rate = Math.max(0.3, speed * 0.85);

    const voices = window.speechSynthesis.getVoices();
    const cnVoice = voices.find(v => v.lang === 'zh-CN');
    if (cnVoice) utterance.voice = cnVoice;

    utterance.onend = () => {
        setSpeaking(false);
        isPlaying = false;
    };

    utterance.onerror = () => {
        setSpeaking(false);
        isPlaying = false;
    };

    window.speechSynthesis.speak(utterance);
}

function stopAudio() {
    if (currentAudio) {
        currentAudio.pause();
        currentAudio = null;
    }

    if (window.speechSynthesis) {
        window.speechSynthesis.cancel();
    }

    setSpeaking(false);
    isPlaying = false;
}

function setSpeaking(active) {
    if (!speakBtnEl) return;

    if (active) {
        speakBtnEl.classList.add('speaking');
    } else {
        speakBtnEl.classList.remove('speaking');
    }
}

function unlockAudio() {
    try {
        const silence = new Audio("data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=");
        silence.volume = 0;
        silence.play().catch(() => {});
    } catch(e) {}

    if (window.speechSynthesis) {
        window.speechSynthesis.getVoices();
    }
}

/* ═══════════════════════════════════════════════════════════════════════
   TOAST
═══════════════════════════════════════════════════════════════════════ */
function showToast(message, type = 'success') {
    if (!toastEl) return;

    toastEl.textContent = message;
    toastEl.className = `toast ${type}`;

    setTimeout(() => toastEl.classList.add('show'), 10);
    setTimeout(() => toastEl.classList.remove('show'), 2500);
}

/* ═══════════════════════════════════════════════════════════════════════
   START APP
═══════════════════════════════════════════════════════════════════════ */
if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
} else {
    init();
}

</script>
